name: A.L.E.X PR Review

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: true
        type: number
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  alex-pr-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@alex')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@alex'))

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUM="${{ github.event.inputs.pr_number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUM="${{ github.event.issue.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          fi

          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "PR Number: $PR_NUM"

      - name: Check trigger permission
        id: permission
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "issue_comment" ] || [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" -q '.permission' 2>/dev/null || echo "none")
            case "$PERMISSION" in
              admin|maintain|write)
                echo "allowed=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "allowed=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.permission.outputs.allowed == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        if: steps.permission.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr checkout "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}"

      - name: Setup Node.js
        if: steps.permission.outputs.allowed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        if: steps.permission.outputs.allowed == 'true'
        run: npm ci

      - name: Build A.L.E.X
        if: steps.permission.outputs.allowed == 'true'
        run: npm run build

      - name: Capture PR diff
        if: steps.permission.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr diff "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" > pr.diff

      - name: Run A.L.E.X CI review
        if: steps.permission.outputs.allowed == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALEX_MODEL: ${{ vars.ALEX_MODEL || 'gemini-2.5-pro' }}
        run: |
          node dist/cli.js ci \
            --diff-file pr.diff \
            --output-file alex-review.md \
            --format markdown \
            --project "${{ github.repository }}" \
            --pr-number "${{ steps.pr.outputs.number }}"

      - name: Comment review on PR
        if: steps.permission.outputs.allowed == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUM: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const prNum = Number(process.env.PR_NUM);
            const review = fs.readFileSync('alex-review.md', 'utf8');
            const body = [
              review,
              '',
              '<details>',
              '<summary>Informacoes da geracao</summary>',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${context.runId}`,
              `- Data: ${new Date().toISOString()}`,
              '</details>'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              body
            });

      - name: Upload report artifact
        if: steps.permission.outputs.allowed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alex-review-pr-${{ steps.pr.outputs.number }}
          path: alex-review.md
