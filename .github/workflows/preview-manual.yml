name: npm Preview Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run typecheck
          npm test

      - name: Pack preview
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_FILE=$(npm pack --silent)
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: alex-npm-preview
          path: ${{ steps.pack.outputs.package_file }}
